<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Suswapnil Sahu // Neural Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/framer-motion@10/dist/framer-motion.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050505;
    --surface: rgba(255,255,255,0.04);
    --cyan: #00F5FF;
    --lime: #B6FF00;
    --text: #EAEAEA;
    --muted: rgba(234,234,234,0.45);
    --border: rgba(0,245,255,0.12);
    --border-lime: rgba(182,255,0,0.2);
    --glow-cyan: 0 0 30px rgba(0,245,255,0.25), 0 0 60px rgba(0,245,255,0.08);
    --glow-lime: 0 0 30px rgba(182,255,0,0.25), 0 0 60px rgba(182,255,0,0.08);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
  .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { motion, AnimatePresence, useMotionValue, useSpring, useTransform, animate } = window.Motion;
const { useState, useEffect, useRef, useCallback } = React;

/* ── CUSTOM CURSOR ─────────────────────────────────────────────── */
function Cursor() {
  const x = useMotionValue(-100), y = useMotionValue(-100);
  const sx = useSpring(x, { damping: 28, stiffness: 400 });
  const sy = useSpring(y, { damping: 28, stiffness: 400 });
  const [hovered, setHovered] = useState(false);

  useEffect(() => {
    const move = e => { x.set(e.clientX - 6); y.set(e.clientY - 6); };
    const over = e => { if (e.target.closest('button,a,[data-hover]')) setHovered(true); };
    const out = () => setHovered(false);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseover', over);
    window.addEventListener('mouseout', out);
    return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseover', over); window.removeEventListener('mouseout', out); };
  }, []);

  return (
    <motion.div style={{ x: sx, y: sy, position: 'fixed', top: 0, left: 0, width: hovered ? 20 : 12, height: hovered ? 20 : 12, borderRadius: '50%', background: hovered ? 'transparent' : 'var(--cyan)', border: hovered ? '1.5px solid var(--cyan)' : 'none', boxShadow: '0 0 12px var(--cyan)', pointerEvents: 'none', zIndex: 9999, transition: 'width 0.2s, height 0.2s, background 0.2s, border 0.2s', translateX: hovered ? -4 : 0, translateY: hovered ? -4 : 0 }} />
  );
}

/* ── SCROLL PROGRESS ───────────────────────────────────────────── */
function ScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      setProgress((window.scrollY / total) * 100);
    };
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, height: 2, zIndex: 9998, background: 'rgba(255,255,255,0.05)' }}>
      <motion.div style={{ height: '100%', width: `${progress}%`, background: 'linear-gradient(90deg, var(--cyan), var(--lime))', boxShadow: '0 0 8px var(--cyan)', transition: 'width 0.1s linear' }} />
    </div>
  );
}

/* ── TYPING EFFECT ─────────────────────────────────────────────── */
function TypeWriter({ texts }) {
  const [idx, setIdx] = useState(0);
  const [displayed, setDisplayed] = useState('');
  const [deleting, setDeleting] = useState(false);
  useEffect(() => {
    const current = texts[idx];
    let timeout;
    if (!deleting && displayed.length < current.length) {
      timeout = setTimeout(() => setDisplayed(current.slice(0, displayed.length + 1)), 60);
    } else if (!deleting && displayed.length === current.length) {
      timeout = setTimeout(() => setDeleting(true), 1800);
    } else if (deleting && displayed.length > 0) {
      timeout = setTimeout(() => setDisplayed(displayed.slice(0, -1)), 35);
    } else if (deleting && displayed.length === 0) {
      setDeleting(false);
      setIdx((idx + 1) % texts.length);
    }
    return () => clearTimeout(timeout);
  }, [displayed, deleting, idx, texts]);

  return (
    <span style={{ fontFamily: "'JetBrains Mono', monospace", color: 'var(--lime)', fontSize: '1rem', letterSpacing: '0.05em' }}>
      {displayed}<motion.span animate={{ opacity: [1, 0] }} transition={{ repeat: Infinity, duration: 0.8 }}>_</motion.span>
    </span>
  );
}

/* ── NEURAL ORB ─────────────────────────────────────────────────── */
function NeuralOrb() {
  const orbRef = useRef(null);
  const mx = useMotionValue(0), my = useMotionValue(0);

  useEffect(() => {
    const move = e => {
      if (!orbRef.current) return;
      const rect = orbRef.current.getBoundingClientRect();
      const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
      mx.set((e.clientX - cx) * 0.04);
      my.set((e.clientY - cy) * 0.04);
    };
    window.addEventListener('mousemove', move);
    return () => window.removeEventListener('mousemove', move);
  }, []);

  return (
    <motion.div ref={orbRef} style={{ x: mx, y: my, width: 320, height: 320, position: 'relative', flexShrink: 0 }}>
      <motion.div animate={{ scale: [1, 1.06, 1], opacity: [0.6, 1, 0.6] }} transition={{ repeat: Infinity, duration: 3.5, ease: 'easeInOut' }}
        style={{ width: '100%', height: '100%', borderRadius: '50%', background: 'radial-gradient(circle at 35% 35%, rgba(0,245,255,0.35) 0%, rgba(182,255,0,0.12) 45%, rgba(0,245,255,0.04) 70%, transparent 100%)', boxShadow: '0 0 80px rgba(0,245,255,0.3), 0 0 160px rgba(0,245,255,0.1), inset 0 0 60px rgba(0,245,255,0.08)', border: '1px solid rgba(0,245,255,0.15)' }} />
      {[60, 100, 140].map((r, i) => (
        <motion.div key={i} animate={{ rotate: 360 }} transition={{ repeat: Infinity, duration: 8 + i * 3, ease: 'linear' }}
          style={{ position: 'absolute', top: '50%', left: '50%', width: r * 2, height: r * 2, marginLeft: -r, marginTop: -r, borderRadius: '50%', border: `1px solid rgba(0,245,255,${0.08 - i * 0.02})` }}>
          <div style={{ position: 'absolute', top: 0, left: '50%', width: 4, height: 4, marginLeft: -2, marginTop: -2, borderRadius: '50%', background: i === 0 ? 'var(--cyan)' : 'var(--lime)', boxShadow: i === 0 ? '0 0 8px var(--cyan)' : '0 0 8px var(--lime)' }} />
        </motion.div>
      ))}
    </motion.div>
  );
}

/* ── HERO ───────────────────────────────────────────────────────── */
function Hero() {

    <section id="home" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '6rem 2rem 4rem', position: 'relative', overflow: 'hidden' }}>

      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 50%, rgba(0,245,255,0.04) 0%, transparent 70%)', pointerEvents: 'none' }} />

        <motion.div initial={{ opacity: 0, x: -40 }} animate={{ opacity: 1, x: 0 }} transition={{ duration: 0.7, ease: 'easeOut' }} style={{ flex: '1 1 420px' }}>
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.2 }}
            style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.75rem', color: 'var(--cyan)', letterSpacing: '0.2em', marginBottom: '1.2rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
            <motion.span animate={{ opacity: [1, 0, 1] }} transition={{ repeat: Infinity, duration: 1.2 }}>◆</motion.span>

          <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(2rem, 5vw, 3.4rem)', fontWeight: 700, lineHeight: 1.1, marginBottom: '1rem', letterSpacing: '-0.02em' }}>
            <span style={{ color: 'var(--text)' }}>Suswapnil Sahu</span>
            <br />
            <span style={{ color: 'var(--cyan)', textShadow: '0 0 30px rgba(0,245,255,0.4)' }}>// Initializing</span>
            <br />
            <span style={{ color: 'var(--text)' }}>Thought into Code</span>
          </h1>

          <div style={{ marginBottom: '2.2rem', minHeight: '1.6rem' }}>
            <TypeWriter texts={["BCA @ Ravenshaw University", "Backend Logic. Frontend Precision.", "Speed is the baseline."]} />
          </div>

          <motion.button data-hover onClick={() => scrollTo('skills')}
            whileHover={{ scale: 1.04, boxShadow: '0 0 40px rgba(0,245,255,0.5), 0 0 80px rgba(0,245,255,0.15)' }}
            whileTap={{ scale: 0.97 }}

            ENTER INTERFACE →

        </motion.div>

        <motion.div initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 0.9, delay: 0.3, ease: 'easeOut' }}>
          <NeuralOrb />
        </motion.div>
      </div>
    </section>
  );
}

/* ── TIMELINE ───────────────────────────────────────────────────── */

          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.7rem', color: 'var(--cyan)', letterSpacing: '0.2em', marginBottom: '0.6rem' }}>SECTION_01</div>
          <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(1.8rem, 4vw, 2.8rem)', fontWeight: 700, marginBottom: '0.5rem', letterSpacing: '-0.02em' }}>

        {/* Timeline line */}

                whileHover={{ scale: 1.03, boxShadow: `0 0 30px ${item.color}33` }}
                animate={{ scale: active === i ? 1.04 : 1 }}
                style={{ flex: '0 0 300px', scrollSnapAlign: 'start', background: active === i ? `${item.color}09` : 'var(--surface)', backdropFilter: 'blur(20px)', border: `1px solid ${active === i ? item.color + '55' : 'rgba(255,255,255,0.06)'}`, borderRadius: 8, padding: '2rem', cursor: 'none', transition: 'border-color 0.3s, background 0.3s', position: 'relative', overflow: 'hidden' }}>

                <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: '1.1rem', fontWeight: 600, marginBottom: '0.5rem' }}>{item.school}</h3>
                <div style={{ display: 'inline-block', fontSize: '0.7rem', fontFamily: "'JetBrains Mono', monospace", padding: '0.25rem 0.6rem', border: `1px solid ${item.color}55`, color: item.color, borderRadius: 3, marginBottom: '0.9rem', letterSpacing: '0.05em' }}>{item.tag}</div>
                <p style={{ color: 'var(--muted)', fontSize: '0.875rem', lineHeight: 1.65 }}>{item.desc}</p>
              </motion.div>
            ))}
          </div>
        </div>
      </div>
    </section>

}

/* ── SKILLS ─────────────────────────────────────────────────────── */
const skillGroups = [
  { title: 'Languages', icon: '⟨/⟩', items: ['Python', 'Java', 'C++', 'JavaScript'], color: 'var(--cyan)', span: 2 },
  { title: 'Frontend', icon: '◧', items: ['HTML', 'CSS', 'Tailwind', 'React'], color: 'var(--lime)', span: 1 },
  { title: 'Tools', icon: '⊡', items: ['Git', 'Linux'], color: 'var(--cyan)', span: 1 },
  { title: 'Databases', icon: '⊗', items: ['MySQL', 'MongoDB'], color: 'var(--lime)', span: 1 },
];

function SkillCard({ group, delay }) {
  const [tilt, setTilt] = useState({ x: 0, y: 0 });
  const ref = useRef(null);

  const onMove = e => {
    const rect = ref.current.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    setTilt({ x: (e.clientY - cy) * 0.03, y: -(e.clientX - cx) * 0.03 });
  };
  const onLeave = () => setTilt({ x: 0, y: 0 });

  return (
    <motion.div ref={ref} onMouseMove={onMove} onMouseLeave={onLeave} data-hover
      initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ delay, duration: 0.5 }}
      whileHover={{ scale: 1.04, boxShadow: `0 0 40px ${group.color}33, 0 0 80px ${group.color}11` }}
      animate={{ rotateX: tilt.x, rotateY: tilt.y }}
      style={{ gridColumn: `span ${group.span}`, background: 'var(--surface)', backdropFilter: 'blur(24px)', border: `1px solid rgba(255,255,255,0.06)`, borderRadius: 8, padding: '1.8rem', cursor: 'none', transition: 'border-color 0.3s', position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 1, background: `linear-gradient(90deg, transparent, ${group.color}66, transparent)` }} />
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.2rem' }}>
        <span style={{ fontSize: '1.2rem', color: group.color, fontFamily: "'JetBrains Mono', monospace" }}>{group.icon}</span>
        <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: '0.8rem', fontWeight: 600, letterSpacing: '0.12em', color: group.color, textTransform: 'uppercase' }}>{group.title}</span>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
        {group.items.map((item, i) => (
          <motion.span key={i} whileHover={{ scale: 1.08, background: group.color + '22' }}
            style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.8rem', padding: '0.35rem 0.8rem', border: `1px solid ${group.color}33`, color: 'var(--text)', borderRadius: 3, transition: 'all 0.2s', cursor: 'none' }}>
            {item}
          </motion.span>
        ))}
      </div>
    </motion.div>
  );
}

function Skills() {

          <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(1.8rem, 4vw, 2.8rem)', fontWeight: 700, marginBottom: '0.5rem', letterSpacing: '-0.02em' }}>

          <p style={{ color: 'var(--muted)', fontSize: '0.95rem', marginBottom: '3rem' }}>Modules loaded. Ready to execute.</p>
        </motion.div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1rem' }}>

/* ── INTERESTS ──────────────────────────────────────────────────── */
const interests = [
  { title: 'Gaming', sub: 'Strategy • Reflex • Adaptation', desc: 'Gaming sharpened instincts, resource optimization, and pattern recognition under pressure.', icon: '◈', color: 'var(--cyan)', anim: 'pulse' },

function InterestCard({ item, i }) {

      initial={{ opacity: 0, y: 40 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ delay: i * 0.15, duration: 0.55 }}

      <p style={{ color: 'var(--muted)', fontSize: '0.875rem', lineHeight: 1.65 }}>{item.desc}</p>

}

function Interests() {

    <section id="interests" style={{ padding: '7rem 2rem', position: 'relative' }}>
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 20% 60%, rgba(0,245,255,0.03) 0%, transparent 60%)', pointerEvents: 'none' }} />

          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.7rem', color: 'var(--cyan)', letterSpacing: '0.2em', marginBottom: '0.6rem' }}>SECTION_02</div>
          <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(1.8rem, 4vw, 2.8rem)', fontWeight: 700, marginBottom: '0.5rem', letterSpacing: '-0.02em' }}>

/* ── CONTACT ────────────────────────────────────────────────────── */
function Contact() {
  return (
    <section id="contact" style={{ padding: '7rem 2rem 10rem', position: 'relative' }}>

                whileTap={{ scale: 0.97 }}

/* ── NAV DOCK ───────────────────────────────────────────────────── */
const navItems = [
  { label: 'Home', icon: '⌂', id: 'home' },
  { label: 'Evolution', icon: '◈', id: 'evolution' },
  { label: 'Skills', icon: '⬡', id: 'skills' },
  { label: 'Interests', icon: '◉', id: 'interests' },
  { label: 'Contact', icon: '⊠', id: 'contact' },
];

function NavDock() {
  const [hovered, setHovered] = useState(null);
  const [active, setActive] = useState('home');

  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
    }, { threshold: 0.4 });
    navItems.forEach(n => { const el = document.getElementById(n.id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  const scrollTo = id => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });

  return (
    <motion.nav initial={{ y: 80, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.8, duration: 0.5 }}
      style={{ position: 'fixed', bottom: '1.8rem', left: '50%', transform: 'translateX(-50%)', zIndex: 1000, display: 'flex', gap: '0.25rem', background: 'rgba(5,5,5,0.85)', backdropFilter: 'blur(24px)', border: '1px solid rgba(0,245,255,0.12)', borderRadius: 50, padding: '0.6rem 1rem', boxShadow: '0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,245,255,0.05)' }}>
      {navItems.map((item) => (
        <div key={item.id} style={{ position: 'relative' }}>
          {hovered === item.id && (
            <motion.div initial={{ opacity: 0, y: 4 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
              style={{ position: 'absolute', bottom: '110%', left: '50%', transform: 'translateX(-50%)', background: 'rgba(0,245,255,0.1)', backdropFilter: 'blur(12px)', border: '1px solid rgba(0,245,255,0.2)', color: 'var(--cyan)', fontSize: '0.7rem', fontFamily: "'JetBrains Mono', monospace", letterSpacing: '0.08em', padding: '0.3rem 0.7rem', borderRadius: 4, whiteSpace: 'nowrap', pointerEvents: 'none' }}>
              {item.label}
            </motion.div>
          )}
          <motion.button data-hover onClick={() => scrollTo(item.id)}
            onMouseEnter={() => setHovered(item.id)}
            onMouseLeave={() => setHovered(null)}
            whileHover={{ scale: 1.3 }} whileTap={{ scale: 0.9 }}
            style={{ width: 42, height: 42, borderRadius: '50%', border: 'none', cursor: 'none', background: active === item.id ? 'rgba(0,245,255,0.12)' : 'transparent', color: active === item.id ? 'var(--cyan)' : 'var(--muted)', fontSize: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'JetBrains Mono', monospace", transition: 'all 0.2s', boxShadow: active === item.id ? '0 0 16px rgba(0,245,255,0.3)' : 'none' }}>
            {item.icon}
          </motion.button>
        </div>
      ))}
    </motion.nav>
  );
}

/* ── COMMAND PALETTE ────────────────────────────────────────────── */
function CommandPalette() {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState('');

  useEffect(() => {
    const handler = e => { if (e.key === '/') { e.preventDefault(); setOpen(o => !o); setQuery(''); } if (e.key === 'Escape') setOpen(false); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const filtered = navItems.filter(n => n.label.toLowerCase().includes(query.toLowerCase()));

  return (
    <AnimatePresence>
      {open && (
        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setOpen(false)}
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 9990, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: '20vh' }}>
          <motion.div initial={{ scale: 0.95, y: -20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.95, y: -20 }} onClick={e => e.stopPropagation()}
            style={{ width: 400, background: 'rgba(10,10,10,0.97)', backdropFilter: 'blur(40px)', border: '1px solid rgba(0,245,255,0.2)', borderRadius: 8, overflow: 'hidden', boxShadow: '0 0 60px rgba(0,245,255,0.1)' }}>
            <div style={{ padding: '0.75rem 1rem', borderBottom: '1px solid rgba(255,255,255,0.05)', display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", color: 'var(--cyan)', fontSize: '0.8rem' }}>⌘</span>
              <input autoFocus value={query} onChange={e => setQuery(e.target.value)} placeholder="Jump to section…"
                style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: 'var(--text)', fontFamily: "'Inter', sans-serif", fontSize: '0.9rem' }} />
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.65rem', color: 'var(--muted)', border: '1px solid rgba(255,255,255,0.1)', padding: '0.1rem 0.35rem', borderRadius: 3 }}>ESC</span>
            </div>
            {filtered.map(item => (
              <motion.button key={item.id} data-hover whileHover={{ background: 'rgba(0,245,255,0.06)' }}
                onClick={() => { document.getElementById(item.id)?.scrollIntoView({ behavior: 'smooth' }); setOpen(false); }}
                style={{ width: '100%', padding: '0.85rem 1rem', display: 'flex', alignItems: 'center', gap: '0.8rem', background: 'none', border: 'none', cursor: 'none', color: 'var(--text)', textAlign: 'left', borderBottom: '1px solid rgba(255,255,255,0.03)' }}>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", color: 'var(--cyan)', fontSize: '0.9rem' }}>{item.icon}</span>
                <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: '0.9rem', fontWeight: 500 }}>{item.label}</span>
              </motion.button>
            ))}
            <div style={{ padding: '0.5rem 1rem', color: 'var(--muted)', fontSize: '0.7rem', fontFamily: "'JetBrains Mono', monospace", letterSpacing: '0.06em' }}>Press / to toggle • ESC to close</div>
          </motion.div>
        </motion.div>
      )}
    </AnimatePresence>
  );
}

/* ── APP ────────────────────────────────────────────────────────── */
function App() {
  return (
    <>
      <Cursor />
      <ScrollProgress />
      <NavDock />
      <CommandPalette />
      <main>
        <Hero />
        <Timeline />
        <Skills />
        <Interests />
        <Contact />
      </main>
      {/* hint */}
      <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 2 }}
        style={{ position: 'fixed', bottom: '6rem', right: '1.5rem', fontFamily: "'JetBrains Mono', monospace", fontSize: '0.65rem', color: 'var(--muted)', letterSpacing: '0.1em', pointerEvents: 'none' }}>
        press / for commands
      </motion.div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
